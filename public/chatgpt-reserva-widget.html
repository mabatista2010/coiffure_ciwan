<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Reservation</title>
    <style>
      :root {
        color: #111;
        font-family: system-ui, -apple-system, sans-serif;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #f7f7f7;
      }

      main {
        width: min(100%, 760px);
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 170px;
        border-radius: 14px;
        overflow: hidden;
        background: #eaeaea;
      }

      #hero {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      #hero.is-ready {
        opacity: 1;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.25),
          rgba(0, 0, 0, 0.1)
        );
      }

      .hero-logo {
        width: 110px;
        max-width: 60%;
        height: auto;
        filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.35));
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .hero-logo.is-ready {
        opacity: 1;
      }

      h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 16px;
        font-weight: 600;
        color: #222;
      }

      label {
        display: block;
        margin: 0;
        font-size: 12px;
        color: #444;
      }

      select,
      input,
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d7d7d7;
        font-size: 14px;
        box-sizing: border-box;
      }

      .locations,
      .stylists {
        margin-top: 12px;
      }

      .locations-track {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .location-card {
        background: #f7f7f7;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        min-height: 170px;
      }

      .location-card.selected {
        border-color: #c8981d;
        box-shadow: 0 0 0 2px rgba(200, 152, 29, 0.2);
      }

      .location-card img {
        width: 100%;
        height: 110px;
        object-fit: cover;
        display: block;
        background: #eaeaea;
      }

      .location-card .card-body {
        padding: 10px;
        font-size: 12px;
        color: #444;
      }

      .stylists-track {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }

      .stylist-card {
        background: #f7f7f7;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 72px;
      }

      .stylist-card img {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        object-fit: cover;
        background: #e0e0e0;
      }

      .stylist-card .name {
        font-size: 13px;
        font-weight: 600;
        color: #222;
      }

      .empty {
        font-size: 12px;
        color: #666;
      }

      .is-hidden {
        display: none !important;
      }

      .muted {
        color: #666;
        font-size: 12px;
        margin-bottom: 8px;
      }

      #status {
        margin-top: 10px;
      }

      .intro {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      @media (min-width: 980px) {
        main {
          width: min(100%, 900px);
          padding: 20px;
        }

        .intro {
          gap: 12px;
        }

        .hero {
          height: 190px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" id="welcome-section">
        <div class="hero">
          <img id="hero" alt="Salon de coiffure" />
          <div class="hero-overlay">
            <img class="hero-logo" id="hero-logo" alt="Steel & Blade" />
          </div>
        </div>
        <h2 id="welcome-title">Bienvenue chez Steel & Blade</h2>
        <div id="welcome-subtitle" class="muted">
          Que puis-je faire pour vous aujourd'hui ?
        </div>
      </section>

      <section class="locations" id="locations-section">
        <div class="section-title">Nos centres</div>
        <div class="locations-track" id="locations-track"></div>
        <div class="empty is-hidden" id="locations-empty">
          Aucun centre disponible pour le moment.
        </div>
      </section>

      <section class="stylists" id="stylists-section">
        <div class="section-title">Notre equipe</div>
        <div class="stylists-track" id="stylists-track"></div>
        <div class="empty is-hidden" id="stylists-empty">
          Aucun styliste disponible pour le moment.
        </div>
      </section>
    </main>

    <script type="module">
      const ui = {
        hero: document.querySelector("#hero"),
        logo: document.querySelector("#hero-logo"),
        welcomeSection: document.querySelector("#welcome-section"),
        welcomeTitle: document.querySelector("#welcome-title"),
        welcomeSubtitle: document.querySelector("#welcome-subtitle"),
        locationsSection: document.querySelector("#locations-section"),
        locationsTrack: document.querySelector("#locations-track"),
        locationsEmpty: document.querySelector("#locations-empty"),
        stylistsSection: document.querySelector("#stylists-section"),
        stylistsTrack: document.querySelector("#stylists-track"),
        stylistsEmpty: document.querySelector("#stylists-empty"),
      };

      let state = {
        view: "welcome",
        welcome: {
          title: "Bienvenue chez Steel & Blade",
          subtitle: "Que puis-je faire pour vous aujourd'hui ?",
          image_url: "",
          logo_url: "",
        },
        locations: [],
        stylists: [],
        selectedLocationId: null,
      };

      let isBootstrapping = true;
      let pendingToolOutput = null;

      const notifyHeight = () => {
        if (window.openai?.notifyIntrinsicHeight) {
          window.openai.notifyIntrinsicHeight();
        }
      };

      const scheduleHeight = () => {
        if (typeof window.requestAnimationFrame === "function") {
          window.requestAnimationFrame(() => notifyHeight());
        } else {
          notifyHeight();
        }
      };

      const selectLocation = (locationId) => {
        if (!locationId) return;
        state.selectedLocationId = locationId;
        if (window.openai?.setWidgetState) {
          window.openai.setWidgetState({ selectedLocationId: locationId });
        }
        renderLocationsGrid();
      };

      const renderLocationsGrid = () => {
        if (!ui.locationsTrack) return;
        ui.locationsTrack.innerHTML = "";
        if (!state.locations.length) {
          ui.locationsEmpty?.classList.remove("is-hidden");
          return;
        }
        ui.locationsEmpty?.classList.add("is-hidden");

        state.locations.forEach((location) => {
          const card = document.createElement("div");
          card.className = "location-card";
          if (state.selectedLocationId === location.id) {
            card.classList.add("selected");
          }

          const img = document.createElement("img");
          img.alt = location.name;
          img.src = location.image_url || "";
          img.addEventListener("load", scheduleHeight, { once: true });
          card.appendChild(img);

          const body = document.createElement("div");
          body.className = "card-body";
          body.innerHTML = `<strong>${location.name}</strong><br/>${location.address || ""}`;
          card.appendChild(body);

          card.addEventListener("click", () => selectLocation(location.id));
          ui.locationsTrack.appendChild(card);
        });

        scheduleHeight();
      };

      const renderStylistsGrid = () => {
        if (!ui.stylistsTrack) return;
        ui.stylistsTrack.innerHTML = "";
        if (!state.stylists.length) {
          ui.stylistsEmpty?.classList.remove("is-hidden");
          return;
        }
        ui.stylistsEmpty?.classList.add("is-hidden");

        state.stylists.forEach((stylist) => {
          const card = document.createElement("div");
          card.className = "stylist-card";

          if (stylist.image_url) {
            const img = document.createElement("img");
            img.alt = stylist.name;
            img.src = stylist.image_url;
            img.addEventListener("load", scheduleHeight, { once: true });
            card.appendChild(img);
          }

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = stylist.name;
          card.appendChild(name);

          ui.stylistsTrack.appendChild(card);
        });

        scheduleHeight();
      };

      const renderView = () => {
        const view = state.view || "welcome";
        if (ui.welcomeSection) {
          ui.welcomeSection.classList.toggle("is-hidden", view !== "welcome");
        }
        if (ui.locationsSection) {
          ui.locationsSection.classList.toggle("is-hidden", view !== "locations");
        }
        if (ui.stylistsSection) {
          ui.stylistsSection.classList.toggle("is-hidden", view !== "stylists");
        }
        scheduleHeight();
      };

      const applyToolOutput = (toolOutput) => {
        if (!toolOutput) return;
        if (toolOutput.view) state.view = toolOutput.view;
        if (toolOutput.welcome) state.welcome = toolOutput.welcome;
        if (toolOutput.locations) state.locations = toolOutput.locations;
        if (toolOutput.stylists) state.stylists = toolOutput.stylists;

        if (state.welcome?.title) {
          ui.welcomeTitle.textContent = state.welcome.title;
        }
        if (state.welcome?.subtitle) {
          ui.welcomeSubtitle.textContent = state.welcome.subtitle;
        }
        if (state.welcome?.image_url) {
          if (ui.hero.src !== state.welcome.image_url) {
            ui.hero.classList.remove("is-ready");
            ui.hero.src = state.welcome.image_url;
          }
          if (ui.hero.complete) {
            ui.hero.classList.add("is-ready");
            scheduleHeight();
          } else {
            ui.hero.addEventListener(
              "load",
              () => {
                ui.hero.classList.add("is-ready");
                scheduleHeight();
              },
              { once: true }
            );
          }
        }

        if (state.welcome?.logo_url && ui.logo) {
          if (ui.logo.src !== state.welcome.logo_url) {
            ui.logo.classList.remove("is-ready");
            ui.logo.src = state.welcome.logo_url;
          }
          if (ui.logo.complete) {
            ui.logo.classList.add("is-ready");
          } else {
            ui.logo.addEventListener(
              "load",
              () => {
                ui.logo.classList.add("is-ready");
                scheduleHeight();
              },
              { once: true }
            );
          }
        }

        renderLocationsGrid();
        renderStylistsGrid();
        renderView();
      };

      const updateFromResponse = (response) => {
        if (!response) return;
        applyToolOutput(response.structuredContent);
      };

      const callTool = async (name, payload, options = { apply: true }) => {
        if (!window.openai?.callTool) return null;
        const response = await window.openai.callTool(name, payload);
        if (options.apply) {
          updateFromResponse(response);
        }
        return response;
      };

      const bootstrap = async () => {
        applyToolOutput(window.openai?.toolOutput);
        const widgetState = window.openai?.widgetState;
        if (widgetState?.selectedLocationId) {
          state.selectedLocationId = widgetState.selectedLocationId;
        }
        isBootstrapping = false;
        applyToolOutput(pendingToolOutput || window.openai?.toolOutput);
        pendingToolOutput = null;
      };

      window.addEventListener(
        "openai:set_globals",
        (event) => {
          const globals = event.detail?.globals;
          if (isBootstrapping) {
            pendingToolOutput = globals?.toolOutput || pendingToolOutput;
          return;
        }
        applyToolOutput(globals?.toolOutput);
      },
      { passive: true }
      );

      bootstrap();
    </script>
  </body>
</html>
